<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天菜產生器 - AI Tag Filter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入 Inter 與 Noto Sans TC 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* CSS 變數：設計規範 */
        :root {
            /* 核心色盤 (Light Mode 預設) */
            --bg-color: #F5F7FA;
            --surface: #FFFFFF;
            --text-main: #333333;
            --text-muted: #666666;
            --border-line: #E2E8F0;
            
            /* 狀態色彩 */
            --success: #5AC8A5;
            --error: #F06292;
            --warning: #FFB74D;
            --info: #4FC3F7;

            /* Mode 特定色彩 (動態變更) */
            --theme-color: #3b82f6; /* Clean 預設藍色 */
            --theme-glow: rgba(59, 130, 246, 0.3);
            
            /* UI 參數 */
            --radius-sm: 8px;
            --radius-md: 12px;
        }

        /* 暗色模式變數 */
        body.dark-mode {
            --bg-color: #0F172A;
            --surface: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border-line: #334155;
        }

        /* Mode 覆寫：控制整體的 Theme Color */
        body.mode-clean { --theme-color: #3b82f6; --theme-glow: rgba(59, 130, 246, 0.3); } /* 藍色 */
        body.mode-sexy { --theme-color: #ec4899; --theme-glow: rgba(236, 72, 153, 0.3); }  /* 粉色 */
        body.mode-nsfw { --theme-color: #ea580c; --theme-glow: rgba(234, 88, 12, 0.3); }   /* 紅橘色 */

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            /* 防誤觸：禁止手機下拉重新整理 */
            overscroll-behavior-y: none; 
        }

        /* 動態主題工具 Class */
        .text-theme { color: var(--theme-color); transition: color 0.3s ease; }
        .bg-theme { background-color: var(--theme-color); transition: background-color 0.3s ease; }
        .border-theme { border-color: var(--theme-color); transition: border-color 0.3s ease; }

        .bg-surface { background-color: var(--surface); transition: background-color 0.3s; }
        .text-main { color: var(--text-main); transition: color 0.3s; }
        .text-muted { color: var(--text-muted); transition: color 0.3s; }
        .border-line { border-color: var(--border-line); transition: border-color 0.3s; }
        
        .panel {
            background-color: var(--surface);
            border: 1px solid var(--border-line);
            border-radius: var(--radius-md);
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        /* 輸入框與選擇器 */
        .input-field {
            background-color: var(--bg-color);
            border: 1px solid var(--border-line);
            color: var(--text-main);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--theme-color);
            box-shadow: 0 0 0 2px var(--theme-glow);
        }

        select.input-field {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }
        select.has-value {
            border-color: var(--theme-color) !important;
            box-shadow: 0 0 0 1px var(--theme-glow);
        }

        /* 標籤設計 */
        .field-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.375rem;
            display: flex;
            align-items: center;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .field-label i { width: 18px; text-align: center; margin-right: 4px; color: var(--theme-color); transition: color 0.3s ease;}
        
        /* 頁籤 */
        .tab-btn { transition: all 0.2s ease; border-bottom: 2px solid transparent; }
        .tab-active { border-bottom-color: var(--theme-color); color: var(--theme-color); background: rgba(128, 128, 128, 0.05); }
        .tab-inactive { color: var(--text-muted); }
        .tab-inactive:hover { color: var(--text-main); background: rgba(128, 128, 128, 0.02); }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border-line); border-radius: 4px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: var(--theme-color); }

        /* Toasts */
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast {
            background-color: var(--surface); color: var(--text-main); padding: 1rem 1.5rem; border-radius: var(--radius-sm);
            border-left: 4px solid var(--theme-color); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; gap: 0.75rem;
            transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 0.875rem; font-weight: 500; border: 1px solid var(--border-line);
        }
        .toast.show { transform: translateX(0); }

        /* Custom Modal */
        #custom-dialog { backdrop-filter: blur(4px); transition: opacity 0.2s ease; }
        #custom-dialog.hidden { opacity: 0; pointer-events: none; }
        #custom-dialog:not(.hidden) { opacity: 1; pointer-events: auto; }
        
        .mode-btn { transition: all 0.3s ease; border: 1px solid var(--border-line); opacity: 0.5; filter: grayscale(80%); }
        .mode-btn:hover { opacity: 0.9; filter: grayscale(0%); }
        .mode-active { 
            opacity: 1 !important; 
            filter: grayscale(0%);
            border-color: var(--theme-color) !important; 
            box-shadow: 0 4px 15px var(--theme-glow); 
            transform: translateY(-2px);
            z-index: 10; 
        }
    </style>
</head>
<body class="mode-clean dark-mode h-[100dvh] flex flex-col overflow-hidden">

    <div id="toast-container"></div>

    <!-- 說明與自訂 Modal -->
    <div id="custom-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 p-4">
        <div class="bg-surface border-line border rounded-[12px] shadow-2xl w-full max-w-2xl p-6 transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]" id="dialog-box">
            <h3 id="dialog-title" class="text-xl font-bold text-main mb-3 flex-none">Title</h3>
            <div id="dialog-content" class="text-muted text-sm mb-2 overflow-y-auto custom-scrollbar pr-2 flex-1">Message goes here</div>
            <div class="flex justify-end gap-3 mt-4 flex-none pt-3 border-t border-line">
                <button id="dialog-cancel" class="px-4 py-2 rounded-[8px] text-sm font-medium text-muted hover:text-main hover:bg-gray-500/10 transition border border-transparent">關閉視窗</button>
                <button id="dialog-confirm" class="px-4 py-2 rounded-[8px] text-sm font-medium bg-[var(--theme-color)] text-white hover:opacity-90 transition shadow-lg hidden">確認</button>
            </div>
        </div>
    </div>

    <!-- 頂部固定 Header -->
    <header class="flex-none px-4 md:px-8 py-4 border-b border-line bg-surface z-30 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 overflow-x-hidden">
        <div class="flex flex-col">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight">
                <span class="text-theme">天菜</span><span class="text-main">產生器</span>
            </h1>
            <p class="text-muted text-xs md:text-sm tracking-widest mt-1 font-medium">
                <i class="fas fa-wand-magic-sparkles mr-2 text-theme"></i>輕鬆創造屬於你的男/女主角
            </p>
        </div>

        <div class="flex flex-col md:flex-row gap-3 items-end md:items-center w-full md:w-auto">
            <!-- 輔助按鈕群 -->
            <div class="flex gap-2 mb-2 md:mb-0">
                <button onclick="App.showHelp()" class="panel px-3 py-2 text-sm text-main hover:text-theme transition flex items-center gap-2">
                    <i class="fas fa-book-open text-theme"></i> 說明
                </button>
                <button onclick="App.toggleTheme()" class="panel px-3 py-2 text-sm text-main transition flex items-center gap-2" id="btn-theme-toggle">
                    <i class="fas fa-sun text-yellow-400"></i> 亮色
                </button>
            </div>

            <!-- Mode Switcher -->
            <div class="flex bg-bg-color p-1.5 rounded-[12px] border border-line shadow-inner w-full md:w-auto">
                <button onclick="App.setMode('clean')" id="btn-clean" class="mode-btn flex-1 md:flex-none bg-blue-500/10 text-blue-600 dark:text-blue-400 text-xs px-5 py-2 rounded-l-[8px] flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-leaf text-base mb-1"></i>
                    <span class="font-bold">清純版</span>
                    <span class="text-[9px] opacity-70">Safe</span>
                </button>
                <button onclick="App.setMode('sexy')" id="btn-sexy" class="mode-btn flex-1 md:flex-none bg-pink-500/10 text-pink-600 dark:text-pink-400 text-xs px-5 py-2 border-l border-r border-line flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-heart text-base mb-1"></i>
                    <span class="font-bold">性感版</span>
                    <span class="text-[9px] opacity-70">Standard</span>
                </button>
                <button onclick="App.setMode('nsfw')" id="btn-nsfw" class="mode-btn flex-1 md:flex-none bg-orange-500/10 text-orange-600 dark:text-orange-400 text-xs px-5 py-2 rounded-r-[8px] flex flex-col items-center justify-center gap-1">
                    <i class="fas fa-fire text-base mb-1"></i>
                    <span class="font-bold">NSFW版</span>
                    <span class="text-[9px] opacity-70">Uncensored</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 中間主要內容區塊 (動態自適應高度) -->
    <div class="flex-1 min-h-0 w-full max-w-[1400px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 relative">
        
        <!-- Left Column: Controls (Tabs) 內部獨立捲動 -->
        <main class="lg:col-span-7 panel flex flex-col h-full overflow-hidden">
            <!-- Tabs Navigation -->
            <nav class="flex-none flex border-b border-line bg-surface z-20 shadow-sm overflow-x-auto custom-scrollbar whitespace-nowrap">
                <button onclick="UI.scrollToSection('tab-identity')" id="btn-tab-identity" class="tab-btn flex-1 min-w-[70px] py-4 text-sm font-bold tab-active">
                    <i class="fas fa-user-circle mr-1 text-theme transition-colors"></i>人物
                </button>
                <button onclick="UI.scrollToSection('tab-outfit')" id="btn-tab-outfit" class="tab-btn flex-1 min-w-[70px] py-4 text-sm font-bold tab-inactive">
                    <i class="fas fa-tshirt mr-1 text-theme transition-colors"></i>穿搭
                </button>
                <button onclick="UI.scrollToSection('tab-action')" id="btn-tab-action" class="tab-btn flex-1 min-w-[70px] py-4 text-sm font-bold tab-inactive">
                    <i class="fas fa-running mr-1 text-theme transition-colors"></i>動作
                </button>
                <button onclick="UI.scrollToSection('tab-scene')" id="btn-tab-scene" class="tab-btn flex-1 min-w-[70px] py-4 text-sm font-bold tab-inactive">
                    <i class="fas fa-map-marked-alt mr-1 text-theme transition-colors"></i>場景
                </button>
                <button onclick="UI.scrollToSection('tab-camera')" id="btn-tab-camera" class="tab-btn flex-1 min-w-[70px] py-4 text-sm font-bold tab-inactive">
                    <i class="fas fa-camera mr-1 text-theme transition-colors"></i>鏡頭
                </button>
            </nav>

            <!-- 內部可滑動區塊 -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-5 md:p-8 space-y-10" id="scroll-content">
                
                <!-- Section 1: 人物 (Identity) -->
                <section id="tab-identity" class="space-y-5">
                    <div class="flex justify-between items-center pb-2 border-b border-line">
                        <h2 class="text-xl font-bold text-main flex items-center"><i class="fas fa-user-circle mr-3 text-theme"></i>人物設定</h2>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div class="sm:col-span-2 lg:col-span-1">
                            <label class="field-label"><i class="fas fa-signature"></i> 人物名稱 (Name)</label>
                            <input type="text" id="char-name" value="Protagonist" class="input-field w-full px-4 py-2 text-theme font-mono text-sm">
                        </div>
                        <div>
                            <label class="field-label"><i class="fas fa-venus-mars"></i> 性別 (Gender)</label>
                            <select id="gender" class="input-field w-full px-4 py-2 text-sm"></select>
                        </div>
                        <div>
                            <label class="field-label"><i class="fas fa-globe-asia"></i> 種族 / 國籍 (Race)</label>
                            <select id="race" class="input-field w-full px-4 py-2 text-sm"></select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div>
                            <label class="field-label"><i class="fas fa-birthday-cake"></i> 年齡 (Age)</label>
                            <select id="char-age" class="input-field w-full px-4 py-2 text-sm"></select>
                        </div>
                        <div>
                            <label class="field-label"><i class="fas fa-ruler-vertical"></i> 身高 (Height)</label>
                            <select id="body-height" class="input-field w-full px-4 py-2 text-sm"></select>
                        </div>
                        <div>
                            <label class="field-label text-theme"><i class="fas fa-shapes"></i> 體態 (Type)</label>
                            <select id="body-type" class="input-field w-full px-4 py-2 text-sm"></select>
                        </div>
                    </div>

                    <div id="bust-container" class="bg-gray-500/5 p-4 rounded-[8px] border border-line">
                        <div class="flex justify-between items-center mb-3">
                            <label class="field-label text-theme !mb-0"><i class="fas fa-ruler-combined"></i> 三圍數據 (Measurements)</label>
                            <span id="bust-warn" class="text-[10px] text-[var(--success)] font-bold hidden flex items-center bg-[var(--success)]/10 px-2 py-1 rounded-full"><i class="fas fa-shield-alt mr-1"></i> 安全模式隱藏</span>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div>
                                <label class="text-[10px] text-muted block mb-1">胸圍 (Bust)</label>
                                <select id="body-bust" class="input-field w-full px-2 py-1.5 text-xs mb-1"></select>
                                <input type="text" id="body-bust-custom" placeholder="自訂..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                            </div>
                            <div>
                                <label class="text-[10px] text-muted block mb-1">腰圍 (Waist)</label>
                                <select id="body-waist" class="input-field w-full px-2 py-1.5 text-xs mb-1"></select>
                                <input type="text" id="body-waist-custom" placeholder="自訂..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                            </div>
                            <div>
                                <label class="text-[10px] text-muted block mb-1">臀圍 (Hip)</label>
                                <select id="body-hip" class="input-field w-full px-2 py-1.5 text-xs mb-1"></select>
                                <input type="text" id="body-hip-custom" placeholder="自訂..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                            </div>
                        </div>
                    </div>

                    <!-- 臉部、髮型、妝容與表情六宮格 -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div>
                            <label class="field-label"><i class="fas fa-cut"></i> 髮型 (Style)</label>
                            <select id="hair-style" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="hair-style-custom" placeholder="自訂髮型..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>
                        <div>
                            <label class="field-label"><i class="fas fa-palette"></i> 髮色 (Color)</label>
                            <select id="hair-color" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="hair-color-custom" placeholder="自訂髮色..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>
                        <div>
                            <label class="field-label"><i class="fas fa-eye"></i> 瞳色 (Eyes)</label>
                            <select id="eye-color" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="eye-color-custom" placeholder="自訂瞳色..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>
                        <div>
                            <label class="field-label"><i class="fas fa-smile"></i> 臉型 (Face)</label>
                            <select id="face-shape" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="face-shape-custom" placeholder="自訂臉型..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>
                        <div>
                            <label class="field-label"><i class="fas fa-hand-sparkles"></i> 膚質 (Skin)</label>
                            <select id="skin-type" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="skin-type-custom" placeholder="自訂膚質..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>
                        <div>
                            <label class="field-label text-theme"><i class="fas fa-laugh"></i> 臉部表情 (Expression)</label>
                            <select id="action-expression" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="action-expression-custom" placeholder="自訂表情..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>

                        <div>
                            <label class="field-label text-theme"><i class="fas fa-paint-brush"></i> 底妝 (Base)</label>
                            <select id="makeup-base" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="makeup-base-custom" placeholder="自訂底妝..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>
                        <div>
                            <label class="field-label text-theme"><i class="fas fa-star"></i> 妝容細節</label>
                            <select id="makeup-detail-1" class="input-field w-full px-3 py-2 text-sm mb-1"></select>
                            <input type="text" id="makeup-detail-1-custom" placeholder="自訂細節..." class="input-field w-full px-2 py-1.5 text-xs text-muted">
                        </div>
                    </div>

                    <!-- 特殊質感 -->
                    <div class="bg-[var(--theme-glow)] border border-theme p-3 rounded-[8px] transition-all duration-300">
                        <label class="field-label text-theme mb-2"><i class="fas fa-wand-magic-sparkles"></i> 特殊質感疊加 (Effects)</label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
                            <label class="flex items-center space-x-2 cursor-pointer bg-surface px-3 py-2 rounded-[6px] hover:bg-gray-500/10 border border-line transition">
                                <input type="checkbox" id="effect-damp-hair" class="w-4 h-4 rounded" style="accent-color: var(--theme-color);">
                                <span class="text-xs text-main">💧 頭髮微濕</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer bg-surface px-3 py-2 rounded-[6px] hover:bg-gray-500/10 border border-line transition">
                                <input type="checkbox" id="effect-wet-skin" class="w-4 h-4 rounded" style="accent-color: var(--theme-color);">
                                <span class="text-xs text-main">💦 濕身汗水</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer bg-surface px-3 py-2 rounded-[6px] hover:bg-gray-500/10 border border-line transition">
                                <input type="checkbox" id="effect-oily" class="w-4 h-4 rounded" style="accent-color: var(--theme-color);">
                                <span class="text-xs text-main">🧴 油光質感</span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- Section 2: 穿搭 (Outfit) -->
                <section id="tab-outfit" class="space-y-5">
                    <div class="flex justify-between items-center pb-2 border-b border-line">
                        <h2 class="text-xl font-bold text-main flex items-center"><i class="fas fa-tshirt mr-3 text-theme"></i>服裝穿搭</h2>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <div class="bg-gray-500/5 p-4 rounded-[8px] border border-line">
                            <label class="field-label text-theme"><i class="fas fa-layer-group"></i> 服裝套裝 (Costume Preset)</label>
                            <select id="outfit-theme" class="input-field w-full px-4 py-2.5 text-sm font-medium mb-1"></select>
                            <input type="text" id="outfit-theme-custom" placeholder="自訂風格 (e.g. wearing a kimono)..." class="input-field w-full px-3 py-1.5 text-xs text-muted">
                        </div>

                        <!-- 穿著效果 (Fit & Physics) -->
                        <div class="bg-gray-500/5 p-4 rounded-[8px] border border-line">

            init: async () => {

            isAllowed: (item) => {
                if (!item.tags) return true;
                return item.tags.includes(AppState.mode);
            },
            populateSelect: (id, dataKey) => {
                const el = document.getElementById(id);
                const data = AppState.db[dataKey];
                if (!el || !data) return;

                const currentVal = el.value;
                const defaultText = el.getAttribute('data-placeholder') || '-- 無 --';
                el.innerHTML = `<option value="">${defaultText}</option>`;
                
                data.forEach(item => {
                    if (item.group) {
                        const group = document.createElement('optgroup');
                        group.label = item.group;
                        item.options.forEach(subItem => {
                            if (Database.isAllowed(subItem)) {
                                const opt = document.createElement('option');
                                opt.value = subItem.value;
                                opt.innerText = subItem.label;
                                group.appendChild(opt);
                            }
                        });
                        if (group.children.length > 0) el.appendChild(group);
                    } else {
                        if (Database.isAllowed(item)) {
                            const opt = document.createElement('option');
                            opt.value = item.value;
                            opt.innerText = item.label;
                            el.appendChild(opt);
                        }
                    }
                });
                
                let exists = false;
                Array.from(el.options).forEach(o => { if(o.value === currentVal) exists = true; });
                if(exists) el.value = currentVal;
            },

        const PromptEngine = {
            v: (id) => document.getElementById(id)?.value || "",
            c: (id) => document.getElementById(id)?.checked || false,
            
            build: () => {
                const p = PromptEngine;
                
                // 輔助函式：合併選擇框與自訂輸入框的內容
                const getF = (id) => {
                    const customId = `${id}-custom`;
                    const customEl = document.getElementById(customId);
                    // 只有當該項目真的有 custom 輸入框時才去抓取，避免出錯
                    if (customEl) {
                        return [p.v(id), p.v(customId)].filter(s => s && s.trim() !== '').join(", ");
                    }
                    return p.v(id);
                };

                let parts = [];

                // 1. Camera & General Style
                let camera = [
                    getF('cam-lens'), getF('cam-aperture'), getF('scene-composition'),
                    getF('cam-shot'), getF('cam-angle'), getF('scene-style-realistic'), getF('scene-style-special')
                ].filter(s => s && s.trim() !== '');
                if(camera.length) parts.push(camera.join(", "));

                // 2. 角色 DNA
                let charName = p.v('char-name');
                let gender = p.v('gender') || 'female';
                let dna = charName ? `Analog photograph of ${charName}` : `Analog photograph`;
                let traits = [p.v('char-age'), p.v('race'), gender].filter(Boolean).join(" ");
                if(traits.length > 3) dna += `, a ${traits}`;
                parts.push(dna);

                let features = [
                    [getF('hair-color'), getF('hair-style')].filter(Boolean).join(" "),
                    getF('eye-color') ? `${getF('eye-color')} eyes` : '',
                    getF('face-shape'),
                    getF('skin-type'),
                    p.c('effect-damp-hair') ? 'noticeably damp hair' : '',
                    p.c('effect-wet-skin') ? 'wet skin, sweating' : '',
                    p.v('body-height'),

                ].filter(s => s && s.length > 1);
                
                let makeup = [getF('makeup-base'), getF('makeup-detail-1')].filter(Boolean);
                if(makeup.length) features.push(makeup.join(", "));

                if(getF('body-waist')) features.push(getF('body-waist'));
                if(getF('body-hip')) features.push(getF('body-hip'));
                if(AppState.mode !== 'clean' && getF('body-bust')) features.push(getF('body-bust'));

                if(features.length) parts.push(features.join(", "));

                // 3. 動作與表情
                let actionStr = [getF('action-pose'), getF('action-activity')].filter(Boolean).join(" while ");
                let expressionStr = getF('action-expression');
                if (actionStr || expressionStr) {
                    parts.push([actionStr ? `She is ${actionStr}` : '', expressionStr].filter(Boolean).join(", "));
                }

                // 4. 服裝
                let topItem = [p.v('top-color'), p.v('top-mat'), p.v('top-pat'), p.v('outfit-top')].filter(Boolean).join(" ");
                let bottomItem = [p.v('bottom-color'), p.v('bottom-mat'), p.v('bottom-pat'), p.v('outfit-bottom')].filter(Boolean).join(" ");
                
                let outfits = [
                    getF('outfit-theme'), 
                    getF('outfit-head'), 
                    p.v('outfit-acc') ? [getF('outfit-acc-detail'), getF('outfit-acc')].filter(Boolean).join(" ") : getF('outfit-acc'),
                    getF('outfit-hands'),
                    getF('outfit-outer'), 
                    [topItem, document.getElementById('outfit-top-custom') ? p.v('outfit-top-custom') : ''].filter(Boolean).join(", "),
                    [bottomItem, document.getElementById('outfit-bottom-custom') ? p.v('outfit-bottom-custom') : ''].filter(Boolean).join(", "),
                    getF('outfit-bag'),
                    getF('outfit-sock'),
                    getF('outfit-shoe')
                ].filter(s => s && s.trim() !== '');
                if(outfits.length) {
                    let outfitStr = `wearing ${outfits.join(", ")}`;
                    if (getF('outfit-fit-physics')) outfitStr += `, ${getF('outfit-fit-physics')}`;
                    parts.push(outfitStr);
                } else if (getF('outfit-fit-physics')) {
                    parts.push(getF('outfit-fit-physics'));
                }

                // 5. 環境與場景
                let env = [
                    getF('scene-time'),
                    getF('scene-weather'),
                    getF('scene-loc'),
                    getF('scene-lighting'),
                    p.v('scene-props') ? [getF('scene-props-detail'), getF('scene-props')].filter(Boolean).join(" ") : getF('scene-props')
                ].filter(s => s && s.trim() !== '');
                if(env.length) parts.push(env.join(", "));

                let finalString = parts.filter(Boolean).join(". ").replace(/\s+/g, ' ').trim();
                document.getElementById('output-text').value = finalString;
                UI.updateVisuals();
            },
            
            randomizeAll: () => {
                document.querySelectorAll('select').forEach(s => {
                    if (s.options.length > 1 && s.id !== 'gender') {
                        s.selectedIndex = Math.floor(Math.random() * s.options.length);
                    }
                });
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = Math.random() > 0.7);
                PromptEngine.build();
                UI.toast("已隨機生成參數", "fa-dice");
            },

            resetAll: () => {
                document.querySelectorAll('.input-field').forEach(el => {
                    if (el.id !== 'char-name' && el.id !== 'bookmark-name' && el.id !== 'bookmark-select' && el.id !== 'gender') {
                        el.value = "";

                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                PromptEngine.build();
                UI.toast("已清除所有選擇", "fa-eraser");

            copyPrompt: (withNegative = false) => {
                const positiveText = document.getElementById('output-text').value;
                if(!positiveText) return;
                
                let copyText = positiveText;
                if (withNegative) {
                    const negativeText = "\nNegative Prompt: worst quality, low quality, blurry, low saturation, worst quality, blurry, watermark, text, error, acnes, age spot, 6 more fingers on one hand, deformity, bad legs, error legs, bad feet, malformed limbs, extra limbs, ugly, poorly drawn hands, poorly drawn feet, poorly drawn face, mutilated, extra fingers, mutated hands, bad hands, missing fingers, extra digit, fewer digits,bad anatomy, cloned face, disfigured, fused fingers,";
                    copyText += negativeText;

                const textArea = document.createElement("textarea");
                textArea.value = copyText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    UI.toast(withNegative ? "已複製提示詞與負面詞！" : "提示詞已複製！");
                    HistoryManager.add(positiveText); // 只把正向詞加入歷史紀錄

        const BookmarkManager = {
            getConfig: () => {
                let config = { mode: AppState.mode, inputs: {}, checkboxes: {} };
                document.querySelectorAll('select, input[type="text"]').forEach(el => { if(el.id && el.id !== 'bookmark-name') config.inputs[el.id] = el.value; });
                document.querySelectorAll('input[type="checkbox"]').forEach(el => { if(el.id) config.checkboxes[el.id] = el.checked; });
                return config;
            },
            applyConfig: (config) => {
                if(!config) return;
                App.setMode(config.mode || 'clean');
                Object.entries(config.inputs || {}).forEach(([id, val]) => { const el = document.getElementById(id); if(el) el.value = val; });
                Object.entries(config.checkboxes || {}).forEach(([id, val]) => { const el = document.getElementById(id); if(el) el.checked = val; });
                PromptEngine.build();
            },
            save: () => {
                let nameInput = document.getElementById('bookmark-name');
                let name = nameInput.value.trim();
                if (!name) {
                    name = document.getElementById('char-name').value.trim() || '未命名書籤';
                    nameInput.value = name;
                }
                let favs = JSON.parse(localStorage.getItem('wm_bookmarks') || '[]');
                favs.unshift({ label: name, config: BookmarkManager.getConfig(), date: new Date().toLocaleDateString() });
                localStorage.setItem('wm_bookmarks', JSON.stringify(favs));
                BookmarkManager.render();
                UI.toast(`已儲存書籤：${name}`);
                nameInput.value = '';
            },
            render: () => {
                const select = document.getElementById('bookmark-select');
                const favs = JSON.parse(localStorage.getItem('wm_bookmarks') || '[]');
                select.innerHTML = '<option value="">-- 選擇書籤 --</option>';
                favs.forEach((f, i) => {
                    let opt = document.createElement('option');
                    opt.value = i;
                    opt.innerText = `${f.label} (${f.date})`;
                    select.appendChild(opt);
                });

            load: () => {
                const idx = document.getElementById('bookmark-select').value;
                if(idx === "") return UI.toast("請先選擇書籤", "fa-exclamation-circle");
                const favs = JSON.parse(localStorage.getItem('wm_bookmarks') || '[]');
                if(favs[idx]) {
                    BookmarkManager.applyConfig(favs[idx].config);
                    UI.toast(`已載入：${favs[idx].label}`);
                }
            },
            deleteSelected: () => {
                const idx = document.getElementById('bookmark-select').value;
                if(idx === "") return UI.toast("請先選擇要刪除的書籤", "fa-exclamation-circle");
                
                UI.confirm("刪除書籤", "確定要刪除選定的書籤嗎？", () => {
                    let favs = JSON.parse(localStorage.getItem('wm_bookmarks') || '[]');
                    favs.splice(idx, 1);
                    localStorage.setItem('wm_bookmarks', JSON.stringify(favs));
                    BookmarkManager.render();
                    UI.toast("書籤已刪除");
                });
            },
            exportJSON: () => {
                const favs = localStorage.getItem('wm_bookmarks') || '[]';
                const blob = new Blob([favs], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `WardrobeMaster_Bookmarks_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                UI.toast("書籤已匯出");
            },
            importJSON: (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if(Array.isArray(imported)) {
                            localStorage.setItem('wm_bookmarks', JSON.stringify(imported));
                            BookmarkManager.render();
                            UI.toast("書籤匯入成功！");
                        } else { throw new Error("Format Invalid"); }
                    } catch (err) {
                        UI.toast("匯入失敗：檔案格式不正確", "fa-times-circle");
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            }
        };

        const App = {
            setMode: (mode) => {
                AppState.mode = mode;
                
                document.body.classList.remove('mode-clean', 'mode-sexy', 'mode-nsfw');
                document.body.classList.add(`mode-${mode}`);

                ['clean', 'sexy', 'nsfw'].forEach(m => document.getElementById(`btn-${m}`).classList.toggle('mode-active', m === mode));
                
                const statusMap = { clean: ['✅ 安全模式', 'var(--theme-color)'], sexy: ['💜 性感模式', 'var(--theme-color)'], nsfw: ['🔞 越界模式', 'var(--theme-color)'] };
                const statusEl = document.getElementById('mode-status');
                statusEl.innerText = statusMap[mode][0];
                statusEl.style.color = statusMap[mode][1];

                const bustContainer = document.getElementById('bust-container');
                const bustWarn = document.getElementById('bust-warn');
                if(mode === 'clean') {
                    bustWarn.classList.remove('hidden');
                    Array.from(bustContainer.querySelectorAll('select, input')).forEach(s => s.classList.add('opacity-30', 'pointer-events-none'));
                } else {
                    bustWarn.classList.add('hidden');
                    Array.from(bustContainer.querySelectorAll('select, input')).forEach(s => s.classList.remove('opacity-30', 'pointer-events-none'));
                }

                Database.populateAll();
                PromptEngine.build();
            },
            toggleTheme: () => {
                const body = document.body;
                const isDark = body.classList.toggle('dark-mode');
                const btn = document.getElementById('btn-theme-toggle');
                
                if (isDark) {
                    btn.innerHTML = '<i class="fas fa-sun text-yellow-400"></i> 亮色';
                } else {
                    btn.innerHTML = '<i class="fas fa-moon text-yellow-400"></i> 暗色';
                }
            },
            showHelp: () => {
                const content = `
                    <div class="space-y-4 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                        <div class="mb-4">
                            <h4 class="font-bold text-main mb-2 border-b border-line pb-1">💡 操作方式</h4>
                            <ol class="list-decimal pl-5 text-sm space-y-1 text-muted">
                                <li><strong>選擇模式：</strong>依據使用的 AI 平台審查嚴格程度，選擇「清純版」、「性感版」或「NSFW版」。</li>
                                <li><strong>挑選特徵：</strong>切換左側分頁，從下拉選單挑選或自行輸入喜好的風格與細節。</li>
                                <li><strong>複製咒語：</strong>右側會即時生成英文提示詞，點擊「複製提示詞」或「含負面詞複製」。</li>
                                <li><strong>貼上產圖：</strong>將複製的提示詞貼上至下方推薦的 AI 繪圖平台中生成圖片。</li>
                            </ol>
                        </div>

                        <div class="mb-2">
                            <h4 class="font-bold text-main mb-2 border-b border-line pb-1">🔗 AI 平台推薦與分類</h4>
                            <div class="space-y-3">
                                <!-- 嚴格平台 -->

                                    <div class="flex flex-wrap gap-2 text-xs">

                                        <a href="https://dreamina.capcut.com/ai-tool/home/" target="_blank" class="text-blue-400 hover:text-blue-300 underline">即夢</a>
                                        <a href="https://www.doubao.com/chat/create-image" target="_blank" class="text-blue-400 hover:text-blue-300 underline">豆包</a>
                                        <a href="https://app.pixverse.ai/onboard" target="_blank" class="text-blue-400 hover:text-blue-300 underline">吐司 (Pixverse)</a>
                                        <a href="https://copilot.microsoft.com/" target="_blank" class="text-blue-400 hover:text-blue-300 underline">Copilot</a>
                                        <a href="https://www.meta.ai/" target="_blank" class="text-blue-400 hover:text-blue-300 underline">Meta AI</a>
                                    </div>
                                </div>
                                <!-- 寬鬆平台 (性感版) -->
                                <div class="p-3 rounded-[8px] border border-pink-500/50 bg-pink-500/10 text-main">

                                    <div class="flex flex-wrap gap-2 text-xs">

                                        <a href="https://x.ai/" target="_blank" class="text-pink-400 hover:text-pink-300 underline">Grok (xAI)</a>
                                        <a href="https://leonardo.ai/" target="_blank" class="text-pink-400 hover:text-pink-300 underline">Leonardo.ai</a>
                                        <a href="https://www.runninghub.ai/quick-create/VersatileVideoPro" target="_blank" class="text-pink-400 hover:text-pink-300 underline">Runninghub.ai</a>
                                        <a href="https://poe.com/" target="_blank" class="text-pink-400 hover:text-pink-300 underline">Poe</a>
                                    </div>
                                </div>
                                <!-- NSFW 平台 -->
                                <div class="p-3 rounded-[8px] border border-orange-500/50 bg-orange-500/10 text-main">
                                    <h5 class="font-bold text-orange-500 mb-1 flex items-center"><i class="fas fa-fire mr-2"></i>無限制平台 (可用：NSFW版)</h5>
                                    <div class="flex flex-wrap gap-2 text-xs">
                                        <a href="https://civitai.com/" target="_blank" class="text-orange-400 hover:text-orange-300 underline">Civitai</a>
                                        <a href="https://tensor.art/zh-TW" target="_blank" class="text-orange-400 hover:text-orange-300 underline">Tensor.art</a>

                `;
                UI.showModal('<i class="fas fa-book-open text-theme mr-2"></i>平台審查說明與教學', content);
            },
            bindEvents: () => {
                document.querySelectorAll('select, input').forEach(el => {
                    if (el.id === 'import-json' || el.id === 'bookmark-name') return;
                    el.addEventListener('change', PromptEngine.build);
                    if (el.type !== 'checkbox') el.addEventListener('input', PromptEngine.build);
                });

                const container = document.getElementById('scroll-content');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.replace('tab-active', 'tab-inactive'));
                            const btn = document.getElementById(`btn-${entry.target.id}`);
                            if(btn) btn.classList.replace('tab-inactive', 'tab-active');
                        }
                    });
                }, { root: container, rootMargin: "-20% 0px -80% 0px" });
                
                document.querySelectorAll('section').forEach(sec => observer.observe(sec));
            },
            init: async () => {
                await Database.init();
                HistoryManager.render();
                BookmarkManager.render();
                App.bindEvents();
                App.setMode('clean'); // 預設為清純版

                const isDark = document.body.classList.contains('dark-mode');
                const btn = document.getElementById('btn-theme-toggle');
                if (isDark) {
                    btn.innerHTML = '<i class="fas fa-sun text-yellow-400"></i> 亮色';
                } else {
                    btn.innerHTML = '<i class="fas fa-moon text-yellow-400"></i> 暗色';
                }
            }
        };

        document.addEventListener('DOMContentLoaded', App.init);
    </script>
