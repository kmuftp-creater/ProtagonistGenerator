        const Palette = (p) => <Icon {...p}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></Icon>;

        const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
        const Hand = (p) => <Icon {...p}><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></Icon>;
        const ZoomIn = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></Icon>;
        const ZoomOut = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></Icon>;
        const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></Icon>;
        const AlertTriangle = (p) => <Icon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></Icon>;
        const XIcon = (p) => <Icon {...p}><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></Icon>;
        const GraduationCap = (p) => <Icon {...p}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;

        // --- Libs ---
        
        // Image Processing
        async function removeBackgroundLocal(imageUrl, mode = 'auto') {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) return reject(new Error("Failed to get 2D context"));
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    let bgColor = { r: 0, g: 255, b: 0 };
                    let threshold = 120;
                    if (mode === 'auto') {
                        const corners = [{x:0,y:0}, {x:canvas.width-1,y:0}, {x:0,y:canvas.height-1}, {x:canvas.width-1,y:canvas.height-1}];
                        let rSum=0,gSum=0,bSum=0;
                        corners.forEach(c => {
                            const idx = (c.y * canvas.width + c.x) * 4;
                            rSum+=data[idx]; gSum+=data[idx+1]; bSum+=data[idx+2];
                        });
                        bgColor = { r: Math.round(rSum/4), g: Math.round(gSum/4), b: Math.round(bSum/4) };
                        threshold = 40;
                    } else if (mode === 'blue') {
                        bgColor = { r: 0, g: 0, b: 255 };
                    }
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i+1], b = data[i+2];
                        let isBg = false;
                        if (mode === 'green') {
                            if (g > r + 20 && g > b + 20) isBg = true;
                            else if (Math.sqrt((r-bgColor.r)**2 + (g-bgColor.g)**2 + (b-bgColor.b)**2) < threshold) isBg = true;
                        } else if (mode === 'blue') {
                            if (b > r + 20 && b > g + 20) isBg = true;
                            else if (Math.sqrt((r-bgColor.r)**2 + (g-bgColor.g)**2 + (b-bgColor.b)**2) < threshold) isBg = true;
                        } else {
                            if (Math.sqrt((r-bgColor.r)**2 + (g-bgColor.g)**2 + (b-bgColor.b)**2) < threshold) isBg = true;
                        }
                        if (isBg) data[i+3] = 0;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = () => reject(new Error("Failed to load image"));
                img.src = imageUrl;
            });
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
            });
        }

        // Gemini API Helper
        async function callGeminiAPI(apiKey, prompt, base64Image, mimeType) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inline_data: { mime_type: mimeType, data: base64Image.split(',')[1] } }
                    ]
                }]
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `API Error: ${response.status}`);
            }
            const data = await response.json();
            const part = data.candidates?.[0]?.content?.parts?.find(p => p.inline_data);
            if (!part) throw new Error("No image returned from Gemini");
            return `data:image/jpeg;base64,${part.inline_data.data}`;
        }

        const generateSolidBackground = (key, img, mime, color) => {
            const cText = color === 'green' ? 'solid bright green color (#00FF00)' : 'solid bright blue color (#0000FF)';
            const prompt = `Change the background to a ${cText}. CRITICAL: You must strictly preserve the foreground subject (person, face, clothes, accessories, pose) EXACTLY as they are in the original image. Do not regenerate, hallucinate, or alter the subject's appearance, lighting, or details in any way. Only the background pixels should change.`;
            return callGeminiAPI(key, prompt, img, mime);
        };
        const restoreImage = (key, img, mime) => callGeminiAPI(key, 'Enhance this image: deblur, denoise, enhance details, and remove compression artifacts. Make it look high quality, sharp, and clear.', img, mime);
        const colorizeImage = (key, img, mime) => callGeminiAPI(key, 'Colorize this black and white image. Make the colors look highly realistic, natural, and historically accurate.', img, mime);
        const repairOldPhoto = (key, img, mime) => callGeminiAPI(key, 'Restore this old photo. Remove all scratches, dust, tears, and blemishes. Enhance the clarity and restore faded details while preserving the original character of the image.', img, mime);


        // --- Components ---

        const ToastContainer = ({ toasts, removeToast }) => (
            <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-3">
                {toasts.map((toast) => (
                    <div key={toast.id} className="flex items-center gap-3 px-4 py-3 rounded-card border shadow-soft bg-surface-light dark:bg-surface-dark animate-in slide-in-from-bottom-5 fade-in duration-300">
                        {toast.type === 'success' && <CheckCircle className="text-success" size={20} />}
                        {toast.type === 'error' && <AlertCircle className="text-error" size={20} />}
                        {toast.type === 'info' && <Info className="text-brand" size={20} />}
                        <span className="text-sm font-medium">{toast.message}</span>
                        <button onClick={() => removeToast(toast.id)} className="ml-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                            <XIcon size={16} />
                        </button>
                    </div>
                ))}
            </div>
        );

        const ComparisonModal = ({ isOpen, onClose, originalImage, processedImage }) => {
            const [sliderPosition, setSliderPosition] = useState(50);
            const containerRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);

            useEffect(() => {
                if (isOpen) { document.body.style.overflow = 'hidden'; setSliderPosition(50); }
                else { document.body.style.overflow = 'auto'; }
                return () => { document.body.style.overflow = 'auto'; };
            }, [isOpen]);

            const handleMove = (clientX) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
                setSliderPosition((x / rect.width) * 100);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm animate-in fade-in duration-200">
                    <button onClick={onClose} className="absolute top-6 right-6 p-2 text-white/70 hover:text-white bg-black/50 hover:bg-black/80 rounded-full transition-colors z-50"><XIcon size={24} /></button>
                    <div 
                        ref={containerRef}
                        className="relative w-[90vw] h-[80vh] max-w-5xl bg-surface-dark rounded-xl overflow-hidden select-none checkerboard"
                        onMouseMove={(e) => isDragging && handleMove(e.clientX)}
                        onMouseUp={() => setIsDragging(false)}
                        onMouseLeave={() => setIsDragging(false)}
                        onTouchMove={(e) => isDragging && handleMove(e.touches[0].clientX)}
                        onTouchEnd={() => setIsDragging(false)}
                    >
                        <div className="absolute inset-0 w-full h-full"><img src={originalImage} className="w-full h-full object-contain pointer-events-none" /></div>
                        <div className="absolute inset-0 w-full h-full" style={{ clipPath: `polygon(0 0, ${sliderPosition}% 0, ${sliderPosition}% 100%, 0 100%)` }}>
                            <div className="absolute inset-0 w-full h-full bg-surface-dark"><img src={processedImage} className="w-full h-full object-contain pointer-events-none" /></div>
                        </div>
                        <div 
                            className="absolute top-0 bottom-0 w-1 bg-white cursor-ew-resize z-10"
                            style={{ left: `${sliderPosition}%`, transform: 'translateX(-50%)' }}
                            onMouseDown={() => setIsDragging(true)}
                            onTouchStart={() => setIsDragging(true)}
                        >
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-white rounded-full shadow-lg flex items-center justify-center text-gray-800"><ArrowLeftRight size={16} /></div>
                        </div>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, onClose, onConfirm, title, message }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="bg-surface-light dark:bg-surface-dark w-full max-w-sm rounded-2xl shadow-xl p-6">
                        <div className="flex items-center gap-3 text-error mb-4"><AlertTriangle size={24} /><h3 className="text-lg font-bold">{title}</h3></div>
                        <p className="text-gray-600 dark:text-gray-300 mb-6">{message}</p>
                        <div className="flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 rounded-btn font-medium bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">取消</button>
                            <button onClick={() => { onConfirm(); onClose(); }} className="px-4 py-2 rounded-btn font-medium bg-error text-white hover:bg-error/90 transition-colors shadow-soft">確定刪除</button>
                        </div>
                    </div>
                </div>
            );
        };

        const InstructionsModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="bg-white dark:bg-[#262626] w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden max-h-[90vh] flex flex-col">
                        <div className="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800 shrink-0">
                            <div className="flex items-center gap-2 text-lg font-bold text-gray-900 dark:text-white"><GraduationCap className="text-brand" size={24} />功能使用說明</div>
                            <button onClick={onClose} className="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 rounded-full transition-colors"><XIcon size={20} /></button>
                        </div>
                        <div className="p-6 overflow-y-auto space-y-8">
                            <section>
                                <h3 className="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2"><Scissors className="text-brand" size={20} />去背工具</h3>
                                <div className="space-y-4">
                                    <div className="bg-brand/5 border border-brand/10 rounded-xl p-4">
                                        <h4 className="flex items-center gap-2 text-brand font-bold mb-2"><Wand2 size={16} /> 智慧去背 (兩段式 AI)</h4>
                                        <p className="text-sm text-gray-600 dark:text-gray-300 leading-relaxed mb-3">採用創新的「先重繪、後去背」混合架構，適用於任何複雜背景，確保邊緣完美保留。</p>
                                        <ul className="text-sm text-gray-600 dark:text-gray-300 space-y-4 list-disc list-inside ml-2 mb-4">
                                            <li><strong>步驟一 (轉換純色)：</strong>將圖片送至雲端 AI，在「絕對保留主體特徵」的前提下，將複雜背景重繪為標準純色背景。</li>
                                            <li><strong>步驟二 (一鍵去背)：</strong>透過瀏覽器本地運算，精準剔除純色範圍，並內建「溢色抑制」技術消除邊緣光暈。</li>
                                        </ul>
                                    </div>
                                    <div className="bg-warning/5 border border-warning/10 rounded-xl p-4">
                                        <h4 className="flex items-center gap-2 text-warning font-bold mb-2"><Scissors size={16} /> 純色去背 (本地)</h4>
                                        <p className="text-sm text-gray-600 dark:text-gray-300 leading-relaxed">若您的圖片本身已經是純色背景 (如白底、綠幕)，可直接使用此模式進行本地去背，不消耗 AI 額度，處理速度極快。</p>
                                    </div>
                                </div>
                            </section>
                            <section>
                                <h3 className="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2"><Sparkles className="text-indigo-500" size={20} />圖像修復</h3>
                                <div className="grid sm:grid-cols-2 gap-4">
                                    <div className="bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-100 dark:border-indigo-500/20 rounded-xl p-4"><h4 className="text-indigo-600 dark:text-indigo-400 font-bold mb-2 text-sm">畫質增強</h4><p className="text-sm text-gray-600 dark:text-gray-300">去除模糊與降噪，提升整體畫質與細節清晰度。</p></div>

        const ManualEditor = ({ isOpen, onClose, onSave, originalUrl, currentUrl, bgColor, initialAutoRemove = true }) => {
            const [brushMode, setBrushMode] = useState('erase');
            const [brushSize, setBrushSize] = useState(20);
            const [viewMode, setViewMode] = useState('transparent');
            const [zoom, setZoom] = useState(1);

            const containerRef = useRef(null);
            const maskCanvasRef = useRef(null);
            const displayCanvasRef = useRef(null);
            const originalCanvasRef = useRef(null);
            const originalImgRef = useRef(null);
            const currentImgRef = useRef(null);
            const isDrawing = useRef(false);
            const lastPos = useRef({ x: 0, y: 0 });
            const isPanning = useRef(false);
            const lastPanPos = useRef({ x: 0, y: 0 });

            useEffect(() => {
                if (!isOpen) return;
                document.body.style.overflow = 'hidden';
                const origImg = new Image(); origImg.crossOrigin = "Anonymous"; origImg.src = originalUrl;
                const currImg = new Image(); currImg.crossOrigin = "Anonymous"; currImg.src = currentUrl;
                let loaded = 0;
                const onImgLoad = () => {
                    loaded++;
                    if (loaded === 2) {
                        originalImgRef.current = origImg;
                        currentImgRef.current = currImg;
                        initCanvases(origImg, currImg);
                    }
                };
                origImg.onload = onImgLoad; currImg.onload = onImgLoad;
                return () => { document.body.style.overflow = 'auto'; };
            }, [isOpen, originalUrl, currentUrl, bgColor]);

            const initCanvases = (origImg, currImg) => {
                const width = origImg.width; const height = origImg.height;
                const maskCanvas = document.createElement('canvas');
                maskCanvas.width = width; maskCanvas.height = height;
                const maskCtx = maskCanvas.getContext('2d');
                maskCtx.drawImage(currImg, 0, 0, width, height);

                if (initialAutoRemove) {
                    const imageData = maskCtx.getImageData(0, 0, width, height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2];
                        let isBg = false;
                        if (bgColor === 'green') {
                            if (g > r + 20 && g > b + 20) isBg = true;
                            else if (Math.sqrt((r-0)**2 + (g-255)**2 + (b-0)**2) < 40) isBg = true;
                        } else {
                            if (b > r + 20 && b > g + 20) isBg = true;
                            else if (Math.sqrt((r-0)**2 + (g-0)**2 + (b-255)**2) < 40) isBg = true;
                        }
                        if (isBg) data[i + 3] = 0;
                    }
                    maskCtx.putImageData(imageData, 0, 0);
                }
                maskCanvasRef.current = maskCanvas;
                displayCanvasRef.current.width = width; displayCanvasRef.current.height = height;
                originalCanvasRef.current.width = width; originalCanvasRef.current.height = height;
                originalCanvasRef.current.getContext('2d').drawImage(origImg, 0, 0);
                updateDisplay();
                setZoom(1); setPan({ x: 0, y: 0 }); setSliderPos(0);
            };

            const updateDisplay = useCallback(() => {
                if (!maskCanvasRef.current || !displayCanvasRef.current) return;
                const ctx = displayCanvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, displayCanvasRef.current.width, displayCanvasRef.current.height);
                ctx.drawImage(maskCanvasRef.current, 0, 0);
            }, []);

            const getPointerPos = (e) => {
                if (!displayCanvasRef.current) return { x: 0, y: 0 };
                const rect = displayCanvasRef.current.getBoundingClientRect();
                let clientX, clientY;
                if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                else { clientX = e.clientX; clientY = e.clientY; }
                const scaleX = displayCanvasRef.current.width / rect.width;
                const scaleY = displayCanvasRef.current.height / rect.height;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            };

            const handlePointerDown = (e) => {
                if (brushMode === 'pan') {
                    isPanning.current = true;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    lastPanPos.current = { x: clientX, y: clientY };
                    return;
                }
                if (sliderPos > 0) setSliderPos(0);
                isDrawing.current = true;
                lastPos.current = getPointerPos(e);
                drawStroke(lastPos.current, lastPos.current);
            };

            const handlePointerMove = (e) => {
                if (isPanning.current) {
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    const dx = clientX - lastPanPos.current.x;
                    const dy = clientY - lastPanPos.current.y;
                    setPan(prev => ({ x: prev.x + dx, y: prev.y + dy }));
                    lastPanPos.current = { x: clientX, y: clientY };
                    return;
                }
                if (!isDrawing.current) return;
                const currentPos = getPointerPos(e);
                drawStroke(lastPos.current, currentPos);
                lastPos.current = currentPos;
            };

            const handlePointerUp = () => { isDrawing.current = false; isPanning.current = false; };

            const drawStroke = (start, end) => {
                if (!maskCanvasRef.current || !originalImgRef.current) return;
                const ctx = maskCanvasRef.current.getContext('2d');
                ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y);
                const rect = displayCanvasRef.current?.getBoundingClientRect();
                const scaleX = rect ? (maskCanvasRef.current.width / rect.width) : 1;
                ctx.lineWidth = brushSize * scaleX;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                if (brushMode === 'erase') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                    ctx.stroke();
                } else {
                    ctx.save();
                    ctx.globalCompositeOperation = 'source-over';
                    const pattern = ctx.createPattern(originalImgRef.current, 'no-repeat');
                    ctx.strokeStyle = pattern || 'rgba(255,255,255,1)';
                    ctx.stroke();
                    ctx.restore();
                }
                updateDisplay();
            };

            const handleSave = () => {
                if (!displayCanvasRef.current || !maskCanvasRef.current) return;
                const saveCanvas = document.createElement('canvas');
                saveCanvas.width = displayCanvasRef.current.width; saveCanvas.height = displayCanvasRef.current.height;
                const ctx = saveCanvas.getContext('2d');
                ctx.drawImage(maskCanvasRef.current, 0, 0);
                onSave(saveCanvas.toDataURL('image/png'));
            };

            if (!isOpen) return null;
            const bgHex = bgColor === 'green' ? '#00FF00' : '#0000FF';
            const cursorStyle = brushMode === 'pan' ? (isPanning.current ? 'grabbing' : 'grab') : 'crosshair';

            return (
                <div className="fixed inset-0 z-50 flex flex-col bg-bg-dark text-gray-200 animate-in fade-in duration-300">
                    <div className="h-14 border-b border-gray-800 flex items-center justify-between px-4 bg-surface-dark shrink-0">
                        <div className="flex items-center gap-2 font-bold"><PenTool className="text-brand" size={20} />手動修圖與預覽</div>
                        <div className="flex items-center gap-3">
                            <button onClick={onClose} className="px-4 py-1.5 rounded-btn text-sm font-medium hover:bg-gray-800 transition-colors">返回</button>
                            <button onClick={handleSave} className="flex items-center gap-2 px-4 py-1.5 rounded-btn text-sm font-medium bg-brand text-white hover:bg-brand/90 transition-colors shadow-soft"><Save size={16} /> 儲存變更</button>
                        </div>
                    </div>
                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-64 border-r border-gray-800 bg-surface-dark p-6 flex flex-col gap-8 overflow-y-auto shrink-0">
                            <div>
                                <h3 className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-4">塗抹工具</h3>
                                <div className="flex flex-col gap-2">
                                    <button onClick={() => { setBrushMode('erase'); setSliderPos(0); }} className={`flex items-center gap-3 px-3 py-2.5 rounded-btn transition-all ${brushMode === 'erase' ? 'bg-error/10 text-error shadow-sm' : 'hover:bg-gray-800 text-gray-400'}`}><Eraser size={18} /> <span className="font-medium text-sm">擦除 (Erase)</span></button>
                                    <button onClick={() => { setBrushMode('restore'); setSliderPos(0); }} className={`flex items-center gap-3 px-3 py-2.5 rounded-btn transition-all ${brushMode === 'restore' ? 'bg-success/10 text-success shadow-sm' : 'hover:bg-gray-800 text-gray-400'}`}><PenTool size={18} /> <span className="font-medium text-sm">還原 (Restore)</span></button>
                                    <button onClick={() => setBrushMode('pan')} className={`flex items-center gap-3 px-3 py-2.5 rounded-btn transition-all ${brushMode === 'pan' ? 'bg-brand/10 text-brand shadow-sm' : 'hover:bg-gray-800 text-gray-400'}`}><Hand size={18} /> <span className="font-medium text-sm">拖曳 (Pan)</span></button>
                                </div>
                            </div>
                            <div>
                                <h3 className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-4">筆刷大小: {brushSize}</h3>
                                <input type="range" min="5" max="100" value={brushSize} onChange={(e) => setBrushSize(Number(e.target.value))} className="w-full accent-brand" />
                            </div>
                            <div>
                                <h3 className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-4">預覽模式</h3>
                                <div className="flex flex-col gap-3">
                                    <label className="flex items-center gap-3 cursor-pointer group" onClick={() => setViewMode('transparent')}>
                                        <div className={`w-5 h-5 rounded flex items-center justify-center border transition-colors ${viewMode === 'transparent' ? 'bg-brand border-brand' : 'border-gray-600 group-hover:border-gray-400'}`}>{viewMode === 'transparent' && <Check size={14} className="text-white" />}</div>
                                        <span className="text-sm font-medium text-gray-300 group-hover:text-white transition-colors">透明去背 (PNG)</span>
                                    </label>
                                    <label className="flex items-center gap-3 cursor-pointer group" onClick={() => setViewMode('color')}>
                                        <div className={`w-5 h-5 rounded flex items-center justify-center border transition-colors ${viewMode === 'color' ? 'bg-brand border-brand' : 'border-gray-600 group-hover:border-gray-400'}`}>{viewMode === 'color' && <Check size={14} className="text-white" />}</div>
                                        <span className="text-sm font-medium text-gray-300 group-hover:text-white transition-colors flex items-center gap-2">{bgColor === 'green' ? '綠幕' : '藍幕'}背景 <span className="w-3 h-3 rounded-full inline-block" style={{ backgroundColor: bgHex }}></span></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 relative overflow-hidden bg-[#1A1A1A] flex items-center justify-center" onWheel={(e) => setZoom(z => Math.max(0.5, Math.min(5.0, z + (e.deltaY > 0 ? -0.1 : 0.1))))}>
                            <div className="absolute top-4 right-4 z-20 flex flex-col bg-surface-dark rounded-btn shadow-lg border border-gray-800 overflow-hidden">
                                <button onClick={() => setZoom(z => Math.min(5, z + 0.2))} className="p-2 hover:bg-gray-700 text-gray-400 hover:text-white transition-colors border-b border-gray-800"><ZoomIn size={18} /></button>
                                <button onClick={() => { setZoom(1); setPan({x:0, y:0}); }} className="p-2 hover:bg-gray-700 text-gray-400 hover:text-white transition-colors border-b border-gray-800 text-xs font-bold">1:1</button>
                                <button onClick={() => setZoom(z => Math.max(0.5, z - 0.2))} className="p-2 hover:bg-gray-700 text-gray-400 hover:text-white transition-colors"><ZoomOut size={18} /></button>
                            </div>
                            <div 
                                ref={containerRef}
                                className={`relative transition-transform duration-75 ${viewMode === 'transparent' ? 'checkerboard' : ''}`}
                                style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, cursor: cursorStyle, touchAction: 'none', backgroundColor: viewMode === 'color' ? bgHex : undefined }}
                                onMouseDown={handlePointerDown} onMouseMove={handlePointerMove} onMouseUp={handlePointerUp} onMouseLeave={handlePointerUp} onTouchStart={handlePointerDown} onTouchMove={handlePointerMove} onTouchEnd={handlePointerUp}
                            >
                                <canvas ref={displayCanvasRef} className="block max-w-full max-h-[80vh] object-contain" />
                                <canvas ref={originalCanvasRef} className="absolute inset-0 block max-w-full max-h-[80vh] object-contain pointer-events-none" style={{ width: '100%', height: '100%', clipPath: `polygon(0 0, ${sliderPos}% 0, ${sliderPos}% 100%, 0 100%)` }} />
                            </div>
                            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 w-64 max-w-[80%] z-20 bg-surface-dark/80 backdrop-blur-md p-3 rounded-xl border border-gray-800 shadow-xl flex items-center gap-3">
                                <span className="text-xs font-medium text-gray-400">結果</span>
                                <input type="range" min="0" max="100" value={sliderPos} onChange={(e) => setSliderPos(Number(e.target.value))} className="flex-1 accent-brand" />
                                <span className="text-xs font-medium text-gray-400">原圖</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [images, setImages] = useState([]);
            const [mode, setMode] = useState('smart');
            const [theme, setTheme] = useState('dark');
            const [bgColor, setBgColor] = useState('green');
            const [isDragging, setIsDragging] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [toasts, setToasts] = useState([]);
            const [comparingImage, setComparingImage] = useState(null);
            const [editingImage, setEditingImage] = useState(null);
            const [isInstructionsOpen, setIsInstructionsOpen] = useState(false);
            const [imageToDelete, setImageToDelete] = useState(null);
            const fileInputRef = useRef(null);

            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);

            const showToast = (message, type = 'info') => {
                const id = Math.random().toString(36).substring(2, 9);
                setToasts(prev => [...prev, { id, message, type }]);
            };
            const removeToast = useCallback((id) => setToasts(prev => prev.filter(t => t.id !== id)), []);

            const getApiKey = () => {
                if (apiKey) return apiKey;
                const key = prompt("請輸入您的 Google Gemini API Key (將儲存於瀏覽器):");
                if (key) { setApiKey(key); localStorage.setItem('gemini_api_key', key); return key; }
                return null;
            };

            const handleFiles = (files) => {
                const validFiles = Array.from(files).filter(file => ['image/png', 'image/jpeg', 'image/jpg', 'image/webp'].includes(file.type));
                if (validFiles.length !== files.length) showToast('部分檔案格式不支援，已忽略', 'warning');
                if (validFiles.length > 0) {
                    const newImages = validFiles.map(file => ({
                        id: Math.random().toString(36).substring(2, 9),
                        file,
                        originalUrl: URL.createObjectURL(file),
                        currentUrl: URL.createObjectURL(file),
                        status: 'idle',
                        isProcessed: false,
                        mimeType: file.type
                    }));
                    setImages(prev => [...prev, ...newImages]);
                    showToast(`成功載入 ${newImages.length} 張圖片`, 'success');
                }
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const clearImages = () => {
                images.forEach(img => { URL.revokeObjectURL(img.originalUrl); if (img.currentUrl !== img.originalUrl) URL.revokeObjectURL(img.currentUrl); });
                setImages([]); showToast('已清空所有圖片', 'info');
            };

            const removeImage = (id) => {
                setImages(prev => {
                    const img = prev.find(i => i.id === id);
                    if (img) { URL.revokeObjectURL(img.originalUrl); if (img.currentUrl !== img.originalUrl) URL.revokeObjectURL(img.currentUrl); }
                    return prev.filter(i => i.id !== id);
                });
            };
            const requestRemoveImage = (id) => { const img = images.find(i => i.id === id); if (img && img.isProcessed) setImageToDelete(id); else removeImage(id); };

            const processStep1 = async () => {
                const key = getApiKey(); if (!key) return;
                setIsProcessing(true);
                let successCount = 0;
                const updatedImages = [...images];
                for (let i = 0; i < updatedImages.length; i++) {
                    const img = updatedImages[i];
                    if (img.status !== 'green_screen' && img.status !== 'bg_removed') {
                        try {
                            const base64 = img.currentUrl.startsWith('data:') ? img.currentUrl : await fileToBase64(img.file);
                            const solidBgUrl = await generateSolidBackground(key, base64, img.mimeType, bgColor);
                            updatedImages[i] = { ...img, currentUrl: solidBgUrl, status: 'green_screen', isProcessed: true, greenScreenUrl: solidBgUrl, processedColor: bgColor };
                            successCount++; setImages([...updatedImages]);
                        } catch (error) { console.error("Step 1 Error:", error); showToast(`圖片 ${img.file.name} 處理失敗: ${error.message}`, 'error'); }
                    }
                }
                setIsProcessing(false);
                if (successCount > 0) showToast(`成功將 ${successCount} 張圖片轉換為${bgColor === 'green' ? '綠幕' : '藍幕'}`, 'success');
            };

            const processStep2 = async () => {
                setIsProcessing(true);
                let successCount = 0;
                const updatedImages = [...images];
                for (let i = 0; i < updatedImages.length; i++) {
                    const img = updatedImages[i];
                    if ((mode === 'smart' && img.status === 'green_screen') || (mode === 'solid' && img.status !== 'bg_removed')) {
                        try {
                            const bgMode = mode === 'smart' ? (img.processedColor || bgColor) : 'auto';
                            const noBgUrl = await removeBackgroundLocal(img.currentUrl, bgMode);
                            updatedImages[i] = { ...img, currentUrl: noBgUrl, status: 'bg_removed', isProcessed: true };
                            successCount++; setImages([...updatedImages]);
                        } catch (error) { console.error("Step 2 Error:", error); showToast(`圖片 ${img.file.name} 去背失敗`, 'error'); }
                    }
                }
                setIsProcessing(false);
                if (successCount > 0) showToast(`成功完成 ${successCount} 張圖片去背`, 'success');
            };

            const handleImageProcessing = async (actionName, apiFunction, successMessage) => {
                const key = getApiKey(); if (!key) return;
                setIsProcessing(true);
                let successCount = 0;
                const updatedImages = [...images];
                for (let i = 0; i < updatedImages.length; i++) {
                    const img = updatedImages[i];
                    try {
                        const base64 = img.currentUrl.startsWith('data:') ? img.currentUrl : await fileToBase64(img.file);
                        const resultUrl = await apiFunction(key, base64, img.mimeType);
                        updatedImages[i] = { ...img, currentUrl: resultUrl, status: 'restored', isProcessed: true };
                        successCount++; setImages([...updatedImages]);
                    } catch (error) { console.error(`${actionName} Error:`, error); showToast(`圖片 ${img.file.name} ${actionName}失敗: ${error.message}`, 'error'); }
                }
                setIsProcessing(false);
                if (successCount > 0) showToast(`成功${successMessage} ${successCount} 張圖片`, 'success');
            };

            const downloadImage = (img) => {
                const link = document.createElement('a'); link.href = img.currentUrl;
                const lastDotIndex = img.file.name.lastIndexOf('.');
                const originalName = lastDotIndex !== -1 ? img.file.name.substring(0, lastDotIndex) : img.file.name;
                const ext = img.status === 'bg_removed' ? 'png' : 'jpg';
                const suffix = img.status === 'bg_removed' ? '_nobg' : '_processed';
                link.download = `${originalName}${suffix}.${ext}`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const downloadAll = async () => {
                const processedImages = images.filter(img => img.isProcessed);
                if (processedImages.length === 0) return;
                showToast('開始下載...', 'info');
                for (let i = 0; i < processedImages.length; i++) {
                    downloadImage(processedImages[i]);
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                showToast('下載完成', 'success');
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                    <div className="max-w-5xl mx-auto space-y-6">
                        <header className="flex items-center justify-between mb-8">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-brand rounded-xl flex items-center justify-center text-white shadow-soft font-bold text-2xl">H</div>
                                <h1 className="text-xl font-bold tracking-tight text-gray-900 dark:text-white">AI 兩段式去背與修復工具</h1>

                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsInstructionsOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-white dark:bg-[#262626] rounded-full shadow-soft hover:scale-105 active:scale-95 transition-all text-sm font-medium border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-200"><BookOpen size={16} className="text-brand" /> 說明</button>
                                <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="flex items-center gap-2 px-4 py-2 bg-white dark:bg-[#262626] rounded-full shadow-soft hover:scale-105 active:scale-95 transition-all text-sm font-medium border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-200">{theme === 'light' ? <Moon size={16} className="text-indigo-500" /> : <Sun size={16} className="text-warning" />}{theme === 'light' ? '暗色' : '亮色'}</button>
                            </div>
                        </header>

                        <div className="bg-white dark:bg-[#262626] rounded-card p-6 shadow-soft border border-gray-200 dark:border-gray-800">
                            <div className="text-center mb-4">
                                <h2 className="text-lg font-semibold text-gray-900 dark:text-white">上傳圖片</h2>
                                <p className="text-sm text-gray-500 dark:text-gray-400 flex items-center justify-center gap-1 mt-1"><CheckCircle size={14} className="text-success" /> 混合式邊緣運算技術</p>
                            </div>
                            <div 
                                className={`border-2 border-dashed rounded-xl p-12 text-center transition-colors cursor-pointer ${isDragging ? 'border-brand bg-brand/5' : 'border-gray-300 dark:border-gray-600 hover:border-brand/50'}`}
                                onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                onDragLeave={(e) => { e.preventDefault(); setIsDragging(false); }}
                                onDrop={(e) => { e.preventDefault(); setIsDragging(false); if (e.dataTransfer.files) handleFiles(e.dataTransfer.files); }}
                                onClick={() => fileInputRef.current?.click()}
                            >
                                <input type="file" ref={fileInputRef} className="hidden" multiple accept=".png,.jpg,.jpeg,.webp" onChange={(e) => e.target.files && handleFiles(e.target.files)} />
                                <UploadCloud size={48} className="mx-auto text-brand mb-4 opacity-80" />
                                <h3 className="text-lg font-medium mb-2">拖放圖片到這裡</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400">或點擊選擇圖片 (可多選)</p>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            <div className="bg-white dark:bg-[#262626] rounded-card p-6 shadow-soft border border-gray-200 dark:border-gray-800">
                                <div className="flex items-center gap-2 mb-4"><Scissors size={20} className="text-brand" /><h3 className="text-lg font-semibold text-gray-900 dark:text-white">去背工具</h3></div>
                                <div className="space-y-4">
                                    <div className="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-lg">
                                        <button onClick={() => setMode('smart')} className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${mode === 'smart' ? 'bg-white dark:bg-gray-700 shadow-sm text-brand' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>智慧去背 (AI)</button>
                                        <button onClick={() => setMode('solid')} className={`flex-1 py-2 text-sm font-medium rounded-md transition-all ${mode === 'solid' ? 'bg-white dark:bg-gray-700 shadow-sm text-warning' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>純色去背 (本地)</button>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        {mode === 'smart' ? (
                                            <>
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="text-sm font-medium text-gray-700 dark:text-gray-300">選擇背景色：</span>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setBgColor('green')} className={`w-6 h-6 rounded-full bg-[#00FF00] border-2 transition-all ${bgColor === 'green' ? 'border-gray-900 dark:border-white scale-110' : 'border-transparent hover:scale-110'}`} title="綠色" />
                                                        <button onClick={() => setBgColor('blue')} className={`w-6 h-6 rounded-full bg-[#0000FF] border-2 transition-all ${bgColor === 'blue' ? 'border-gray-900 dark:border-white scale-110' : 'border-transparent hover:scale-110'}`} title="藍色" />
                                                    </div>
                                                </div>
                                                <button onClick={processStep1} disabled={isProcessing || images.length === 0 || !images.some(img => img.status !== 'green_screen' && img.status !== 'bg_removed')} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-btn font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95">
                                                    {isProcessing ? <Wand2 size={16} className="animate-spin" /> : <Wand2 size={16} />} 1. 轉換為純色背景 (AI)
                                                </button>
                                                <button onClick={processStep2} disabled={isProcessing || images.length === 0 || !images.some(img => img.status === 'green_screen')} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-brand text-white rounded-btn font-medium hover:bg-brand/90 transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 shadow-soft">
                                                    {isProcessing ? <Scissors size={16} className="animate-spin" /> : <Scissors size={16} />} 2. 一鍵去背 (本地)
                                                </button>
                                            </>
                                        ) : (
                                            <button onClick={processStep2} disabled={isProcessing || images.length === 0 || !images.some(img => img.status !== 'bg_removed')} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-warning text-white rounded-btn font-medium hover:bg-warning/90 transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 shadow-soft">
                                                {isProcessing ? <Scissors size={16} className="animate-spin" /> : <Scissors size={16} />} 一鍵去背 (本地)
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white dark:bg-[#262626] rounded-card p-6 shadow-soft border border-gray-200 dark:border-gray-800">
                                <div className="flex items-center gap-2 mb-4"><Sparkles size={20} className="text-indigo-500" /><h3 className="text-lg font-semibold text-gray-900 dark:text-white">圖像修復</h3></div>
                                <div className="grid grid-cols-1 gap-3">
                                    <button onClick={() => handleImageProcessing('畫質增強', restoreImage, '增強')} disabled={isProcessing || images.length === 0} className="flex items-center justify-center gap-2 px-4 py-3 bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 rounded-btn font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 border border-indigo-100 dark:border-indigo-500/20"><Sparkles size={18} /> 畫質增強 (去模糊/降噪)</button>
                                    <button onClick={() => handleImageProcessing('黑白上色', colorizeImage, '上色')} disabled={isProcessing || images.length === 0} className="flex items-center justify-center gap-2 px-4 py-3 bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 rounded-btn font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 border border-indigo-100 dark:border-indigo-500/20"><Palette size={18} /> 黑白照片自動上色</button>
                                    <button onClick={() => handleImageProcessing('老照片除痕', repairOldPhoto, '除痕')} disabled={isProcessing || images.length === 0} className="flex items-center justify-center gap-2 px-4 py-3 bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-500/20 rounded-btn font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 border border-indigo-100 dark:border-indigo-500/20"><Eraser size={18} /> 老照片除痕修復</button>
                                </div>
                            </div>
                        </div>

                        {images.length > 0 && (
                            <div className="flex items-center justify-between bg-white dark:bg-[#262626] rounded-card p-4 shadow-soft border border-gray-200 dark:border-gray-800">
                                <div className="flex items-center gap-4"><span className="text-sm font-medium">共 <span className="text-brand">{images.length}</span> 張</span><button onClick={clearImages} className="flex items-center gap-1 text-sm text-error hover:text-error/80 transition-colors px-2 py-1"><Trash2 size={14} /> 清除全部</button></div>
                                <button onClick={downloadAll} disabled={!images.some(img => img.isProcessed)} className="flex items-center justify-center gap-2 px-6 py-2.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-btn font-medium hover:bg-gray-800 dark:hover:bg-gray-100 transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95 shadow-soft"><Download size={16} /> 下載已處理圖片</button>
                            </div>
                        )}

                        {images.length > 0 && (
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {images.map((img) => (
                                    <div key={img.id} className="group relative aspect-square rounded-card overflow-hidden bg-white dark:bg-[#262626] shadow-soft border border-gray-200 dark:border-gray-800">
                                        <div className={`absolute inset-0 ${img.status === 'bg_removed' ? 'checkerboard' : ''}`} />
                                        <img src={img.currentUrl} alt={img.file.name} className="absolute inset-0 w-full h-full object-contain p-2" />
                                        {img.status !== 'idle' && (
                                            <div className="absolute top-2 left-2 z-10">
                                                <span className={`px-2 py-1 text-[10px] font-bold uppercase tracking-wider rounded-md text-white shadow-sm ${img.status === 'green_screen' ? (img.processedColor === 'blue' ? 'bg-blue-500' : 'bg-success') : img.status === 'restored' ? 'bg-indigo-500' : 'bg-brand'}`}>
                                                    {img.status === 'green_screen' ? (img.processedColor === 'blue' ? '藍幕生成' : '綠幕生成') : img.status === 'restored' ? '已修復' : '已去背'}
                                                </span>
                                            </div>
                                        )}
                                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-200 flex flex-col items-center justify-center gap-3 z-20">
                                            <p className="text-white text-xs font-medium px-4 text-center truncate w-full">{img.file.name}</p>
                                            <div className="flex gap-2">
                                                {img.status !== 'idle' && <button onClick={() => setComparingImage(img)} className="p-2 bg-white/20 hover:bg-white/30 rounded-full text-white transition-colors" title="前後對比"><ArrowLeftRight size={16} /></button>}
                                                {img.status !== 'idle' && <button onClick={() => setEditingImage(img)} className="p-2 bg-white/20 hover:bg-white/30 rounded-full text-white transition-colors" title="手動修圖"><PenTool size={16} /></button>}
                                                {img.isProcessed && <button onClick={() => downloadImage(img)} className="p-2 bg-white/20 hover:bg-white/30 rounded-full text-white transition-colors" title="下載"><Download size={16} /></button>}
                                                <button onClick={() => requestRemoveImage(img.id)} className="p-2 bg-error/80 hover:bg-error rounded-full text-white transition-colors" title="刪除"><Trash2 size={16} /></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    <footer className="max-w-5xl mx-auto mt-12 pb-8 text-center text-sm text-gray-500 dark:text-gray-400">v0.2.6 | ©2026 <a href="https://huobest.com/" target="_blank" rel="noopener noreferrer" className="hover:text-brand transition-colors">霍家私塾</a></footer>
                    <ToastContainer toasts={toasts} removeToast={removeToast} />
                    <InstructionsModal isOpen={isInstructionsOpen} onClose={() => setIsInstructionsOpen(false)} />
                    <ConfirmModal isOpen={!!imageToDelete} onClose={() => setImageToDelete(null)} onConfirm={() => imageToDelete && removeImage(imageToDelete)} title="確定要刪除嗎？" message="此圖片已經過處理，刪除後將無法復原，是否確定刪除？" />
                    {editingImage && <ManualEditor isOpen={!!editingImage} onClose={() => setEditingImage(null)} originalUrl={editingImage.originalUrl} currentUrl={editingImage.currentUrl} bgColor={editingImage.processedColor || bgColor} initialAutoRemove={editingImage.status !== 'bg_removed'} onSave={(newUrl) => { setImages(prev => prev.map(img => img.id === editingImage.id ? { ...img, currentUrl: newUrl, status: 'bg_removed' } : img)); setEditingImage(null); showToast('已儲存手動修圖結果', 'success'); }} />}
                    {comparingImage && <ComparisonModal isOpen={!!comparingImage} onClose={() => setComparingImage(null)} originalImage={comparingImage.originalUrl} processedImage={comparingImage.currentUrl} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
